# nips34_retricd_small: multi-concept items sharing a root concept; denser coverage. Good case to
# show the certificate separates well-covered from thin cells where shared structure still leaves
# some cells unidentifiable.
dataset: nips34_retricd_small
data_root: data_retricd
output_dir: outputs
model: ncdm
epochs: 30
lr: 0.001
batch_size: 256
dropout: 0.2
latent_dim: 32
grad_clip: 5.0
patience: 8
n_min: 2
mc_passes: 20
seed: 42
device: auto
